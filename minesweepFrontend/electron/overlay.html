<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
  }
  .frame {
    width: 100%; height: 100%;
    border: 10px solid rgba(0,255,0,0.85);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(0,0,0,0.25),
      0 0 16px 3px rgba(0,255,0,0.3);
    position: relative;
  }
  /* Label at top-left */
  .label {
    position: absolute;
    top: -2px; left: 4px;
    background: rgba(0,255,0,0.9);
    color: #000;
    font: bold 11px/1.3 "Microsoft YaHei", "Segoe UI", sans-serif;
    padding: 1px 8px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 10;
  }
  /* Size indicator at bottom-right */
  .size {
    position: absolute;
    bottom: -2px; right: 4px;
    background: rgba(0,0,0,0.6);
    color: #00ff00;
    font: bold 11px/1.3 "Consolas", "Courier New", monospace;
    padding: 1px 6px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 10;
  }
  /* Corner indicators */
  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: #fff;
    border-style: solid;
    pointer-events: none;
    z-index: 5;
  }
  .corner.tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
  .corner.tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; }
  .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; }
  .corner.br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }
</style>
</head>
<body>
  <div class="frame">
    <div class="label">🎯 识别区域</div>
    <div class="size" id="size-label"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</body>
</html>
